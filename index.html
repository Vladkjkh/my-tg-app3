<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐋 КИТ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            padding: 15px;
            color: #fff;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .load-btn {
            width: 100%;
            padding: 18px;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 3px;
            border: 2px solid #f7931a;
            border-radius: 12px;
            background: rgba(247,147,26,0.15);
            color: #f7931a;
            cursor: pointer;
            margin-bottom: 15px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
        }
        .type-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: bold;
        }
        .badge-buy { background: rgba(0,255,100,0.15); color: #00ff64; }
        .badge-sell { background: rgba(255,68,68,0.15); color: #ff4444; }
        .badge-transfer { background: rgba(0,180,255,0.15); color: #00b4ff; }
        .btc-amount { font-size: 26px; font-weight: bold; color: #f7931a; margin-top: 8px; }
        .usd-amount { font-size: 16px; color: #ffd700; }
        .addr-box {
            font-size: 10px;
            color: #aaa;
            background: rgba(0,0,0,0.5);
            padding: 8px;
            border-radius: 6px;
            margin: 8px 0;
            font-family: monospace;
            word-break: break-all;
        }
        .history-box {
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            padding: 10px;
            margin-top: 8px;
        }
        .row { display: flex; gap: 6px; }
        .stat {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border-radius: 6px;
            padding: 8px;
            text-align: center;
        }
        .stat-val { font-size: 14px; font-weight: bold; }
        .stat-lbl { font-size: 8px; color: #888; }
        .green { color: #00ff64; }
        .red { color: #ff4444; }
        .loader { text-align: center; padding: 30px; }
        .spinner {
            width: 30px; height: 30px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #f7931a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center;">🐋 Bitcoin Whales</h2>
        <p style="text-align:center; color:#888; font-size:12px; margin-bottom:15px;">Транзакции от 200 BTC из последних блоков</p>

        <button class="load-btn" onclick="load()" id="btn">
            🐋 ЗАГРУЗИТЬ КИТОВ
        </button>

        <div id="list">
            <div style="text-align:center; color:#555; padding:30px;">
                Нажми кнопку
            </div>
        </div>
    </div>

    <script>
        async function load() {
            const btn = document.getElementById('btn');
            const list = document.getElementById('list');
            
            btn.textContent = '⏳ Загружаем...';
            list.innerHTML = '<div class="loader"><div class="spinner"></div></div>';

            try {
                // Получаем последний блок
                const latestRes = await fetch('https://blockchain.info/latestblock');
                const latest = await latestRes.json();
                
                // Получаем содержимое блока
                const blockRes = await fetch(`https://blockchain.info/rawblock/${latest.hash}`);
                const block = await blockRes.json();
                
                // Фильтруем транзакции от 200 BTC
                const whales = block.tx.filter(tx => {
                    const total = tx.out.reduce((s, o) => s + o.value, 0);
                    return total >= 20000000000;
                }).slice(0, 10);

                btn.textContent = '🐋 ЗАГРУЗИТЬ КИТОВ';

                if (!whales.length) {
                    list.innerHTML = `<div style="text-align:center; color:#888; padding:30px;">
                        🐋 В блоке #${latest.height} нет транзакций от 200 BTC<br>
                        <span style="font-size:11px;">Блок: ${new Date(block.time * 1000).toLocaleString('ru-RU')}</span>
                    </div>`;
                    return;
                }

                list.innerHTML = whales.map((tx, i) => {
                    const totalSat = tx.out.reduce((s, o) => s + o.value, 0);
                    const btc = totalSat / 100000000;
                    const addr = tx.out.find(o => o.addr)?.addr || 'Неизвестно';
                    const hash = tx.hash;
                    
                    const totalIn = tx.inputs.reduce((s, inp) => s + (inp.prev_out?.value || 0), 0);
                    const totalOut = tx.out.reduce((s, o) => s + o.value, 0);
                    
                    let type = 'transfer';
                    let typeLabel = '🔵 ПЕРЕВОД';
                    let badgeClass = 'badge-transfer';
                    
                    if (totalIn > totalOut * 1.1) {
                        type = 'buy';
                        typeLabel = '🟢 ПОКУПКА';
                        badgeClass = 'badge-buy';
                    } else if (totalOut > totalIn * 1.1) {
                        type = 'sell';
                        typeLabel = '🔴 ПРОДАЖА';
                        badgeClass = 'badge-sell';
                    }
                    
                    return `
                        <div class="card">
                            <div style="display:flex; justify-content:space-between;">
                                <span style="font-size:11px; color:#666;">Блок #${latest.height}</span>
                                <span class="type-badge ${badgeClass}">${typeLabel}</span>
                            </div>
                            <div class="btc-amount">₿ ${btc.toFixed(2)} BTC</div>
                            <div class="usd-amount">≈ $${(btc * 60000).toLocaleString()}</div>
                            <div style="font-size:10px; color:#888;">
                                🕐 ${new Date(block.time * 1000).toLocaleString('ru-RU')}
                            </div>
                            <div class="addr-box">📍 ${addr}</div>
                            <div style="font-size:9px; color:#555; word-break:break-all;">TX: ${hash}</div>
                        </div>
                    `;
                }).join('');

            } catch (e) {
                btn.textContent = '🐋 ЗАГРУЗИТЬ КИТОВ';
                list.innerHTML = '<div style="text-align:center; color:#ff4444;">⚠️ Ошибка. Попробуй позже.</div>';
            }
        }
    </script>
</body>
</html>
