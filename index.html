<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блокчейн</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            color: #fff;
        }
        .tabs {
            display: flex;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            border: none;
            color: #888;
            background: #111;
            font-size: 14px;
        }
        .tab.active { color: #fff; border-bottom: 2px solid #f7931a; }
        .tab.eth-active { color: #fff; border-bottom: 2px solid #627eea; }
        iframe {
            width: 100%;
            height: calc(100vh - 50px);
            border: none;
        }
    </style>
</head>
<body>
    <div class="tabs">
        <button class="tab active" onclick="switchTab('btc', this)">₿ Bitcoin</button>
        <button class="tab" onclick="switchTab('eth', this)">Ξ Ethereum</button>
    </div>
    
    <iframe id="blockchainFrame" src="https://www.blockchain.com/explorer" allow="clipboard-write"></iframe>

    <script>
        function switchTab(chain, btn) {
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.remove('active', 'eth-active');
            });
            
            if (chain === 'btc') {
                btn.classList.add('active');
                document.getElementById('blockchainFrame').src = 'https://www.blockchain.com/explorer';
            } else {
                btn.classList.add('eth-active');
                document.getElementById('blockchainFrame').src = 'https://etherscan.io';
            }
        }
    </script>
</body>
</html>
