<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блокчейн</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { text-align: center; margin-bottom: 20px; }
        .buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .chain-btn {
            flex: 1;
            padding: 18px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: #fff;
            text-decoration: none;
            text-align: center;
            display: block;
        }
        .btc-btn { background: #f7931a; }
        .eth-btn { background: #627eea; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔗 Блокчейн</h2>
        <p style="text-align:center; color:#888; margin-bottom:20px;">Откроется в браузере</p>
        
        <div class="buttons">
            <a href="https://www.blockchain.com/explorer" target="_blank" class="chain-btn btc-btn">₿ Bitcoin</a>
            <a href="https://etherscan.io" target="_blank" class="chain-btn eth-btn">Ξ Ethereum</a>
        </div>
    </div>
</body>
</html>
