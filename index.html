<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блокчейн</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { text-align: center; margin-bottom: 20px; }
        .buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .chain-btn {
            flex: 1;
            padding: 18px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: #fff;
        }
        .btc-btn { background: #f7931a; }
        .eth-btn { background: #627eea; }
        .chain-btn:active { opacity: 0.7; }
        .tx-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
        }
        .tx-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .tx-hash-text {
            font-size: 10px;
            color: #f7931a;
            font-family: monospace;
            word-break: break-all;
        }
        .tx-time { font-size: 11px; color: #888; }
        .tx-detail {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            margin-bottom: 4px;
        }
        .tx-label { font-size: 10px; color: #888; }
        .tx-address {
            font-size: 9px;
            color: #aaa;
            font-family: monospace;
            word-break: break-all;
        }
        .tx-amount {
            font-size: 13px;
            font-weight: bold;
            text-align: right;
        }
        .in-amount { color: #00ff64; }
        .out-amount { color: #ff4444; }
        .fee { font-size: 10px; color: #888; text-align: right; margin-top: 8px; }
        .block-info-text {
            text-align: center;
            font-size: 11px;
            color: #888;
            margin-bottom: 10px;
        }
        .loader { text-align: center; padding: 30px; }
        .spinner {
            width: 30px; height: 30px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔗 Блокчейн</h2>
        
        <div class="buttons">
            <button class="chain-btn btc-btn" onclick="loadBTC()">₿ Bitcoin</button>
            <button class="chain-btn eth-btn" onclick="loadETH()">Ξ Ethereum</button>
        </div>

        <div id="content">
            <div style="text-align:center; color:#555; padding:40px;">
                Выбери блокчейн
            </div>
        </div>
    </div>

    <script>
        async function loadBTC() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loader"><div class="spinner"></div><p>Загрузка Bitcoin блокчейна...</p></div>';

            try {
                // Получаем последние транзакции через mempool.space API
                const res = await fetch('https://mempool.space/api/recent');
                const txs = await res.json();
                
                content.innerHTML = '<div class="block-info-text">Последние транзакции Bitcoin</div>';

                for (const tx of txs.slice(0, 10)) {
                    try {
                        const txRes = await fetch(`https://mempool.space/api/tx/${tx.txid}`);
                        const txData = await txRes.json();
                        
                        const totalIn = txData.vin.reduce((s, vin) => s + (vin.prevout?.value || 0), 0);
                        const totalOut = txData.vout.reduce((s, vout) => s + (vout.value || 0), 0);
                        const fee = totalIn - totalOut;

                        const card = document.createElement('div');
                        card.className = 'tx-card';
                        card.innerHTML = `
                            <div class="tx-header">
                                <div class="tx-hash-text">${txData.txid.substring(0, 30)}...</div>
                                <div class="tx-time">${txData.status.confirmed ? '✅ Подтверждена' : '⏳ Мемпул'}</div>
                            </div>
                            
                            <div style="font-size:10px; color:#888; margin-bottom:8px;">
                                ${txData.status.confirmed ? 'Блок: ' + txData.status.block_height : 'Ожидает подтверждения'}
                            </div>

                            <div style="margin-bottom:6px;">
                                <div class="tx-label">📤 ОТПРАВИТЕЛИ (Входы):</div>
                                ${txData.vin.slice(0, 3).map(vin => `
                                    <div class="tx-detail">
                                        <div>
                                            <div class="tx-address">${vin.prevout?.scriptpubkey_address || 'Coinbase'}</div>
                                        </div>
                                        <div class="tx-amount out-amount">-${(vin.prevout?.value / 100000000 || 0).toFixed(4)} BTC</div>
                                    </div>
                                `).join('')}
                                ${txData.vin.length > 3 ? `<div style="font-size:9px; color:#555;">+ ещё ${txData.vin.length - 3} входов</div>` : ''}
                            </div>

                            <div>
                                <div class="tx-label">📥 ПОЛУЧАТЕЛИ (Выходы):</div>
                                ${txData.vout.slice(0, 3).map(vout => `
                                    <div class="tx-detail">
                                        <div>
                                            <div class="tx-address">${vout.scriptpubkey_address || 'OP_RETURN'}</div>
                                        </div>
                                        <div class="tx-amount in-amount">+${(vout.value / 100000000).toFixed(4)} BTC</div>
                                    </div>
                                `).join('')}
                                ${txData.vout.length > 3 ? `<div style="font-size:9px; color:#555;">+ ещё ${txData.vout.length - 3} выходов</div>` : ''}
                            </div>

                            <div class="fee">Комиссия: ${(fee / 100000000).toFixed(6)} BTC</div>
                        `;
                        content.appendChild(card);
                    } catch (e) {
                        console.log('Ошибка загрузки транзакции:', e);
                    }
                }
            } catch (e) {
                content.innerHTML = '<div style="text-align:center; color:#ff4444;">Ошибка загрузки Bitcoin</div>';
            }
        }

        async function loadETH() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loader"><div class="spinner"></div><p>Загрузка Ethereum блокчейна...</p></div>';

            try {
                const res = await fetch('https://api.blockchair.com/ethereum/blocks?limit=3');
                const data = await res.json();
                const blocks = Object.values(data.data);

                content.innerHTML = '<div class="block-info-text">Последние блоки Ethereum</div>';

                for (const block of blocks) {
                    const txRes = await fetch(`https://api.blockchair.com/ethereum/transactions?q=block_id(${block.id})&limit=5`);
                    const txData = await txRes.json();
                    const txs = Object.values(txData.data);

                    const blockCard = document.createElement('div');
                    blockCard.style.cssText = 'margin-bottom:15px;';
                    blockCard.innerHTML = `
                        <div style="background:rgba(98,126,234,0.1); padding:10px; border-radius:10px; margin-bottom:8px;">
                            <div style="font-weight:bold; color:#627eea;">Блок #${block.id}</div>
                            <div style="font-size:10px; color:#888;">${new Date(block.time).toLocaleString('ru-RU')} | ${block.transaction_count} транзакций</div>
                        </div>
                    `;
                    content.appendChild(blockCard);

                    for (const tx of txs) {
                        const card = document.createElement('div');
                        card.className = 'tx-card';
                        card.innerHTML = `
                            <div class="tx-header">
                                <div class="tx-hash-text" style="color:#627eea;">${tx.hash.substring(0, 30)}...</div>
                                <div style="font-size:10px; color:#888;">${new Date(tx.time).toLocaleTimeString('ru-RU')}</div>
                            </div>

                            <div class="tx-detail">
                                <div>
                                    <div class="tx-label">📤 От:</div>
                                    <div class="tx-address">${tx.from.substring(0, 20)}...</div>
                                </div>
                            </div>
                            <div class="tx-detail">
                                <div>
                                    <div class="tx-label">📥 Кому:</div>
                                    <div class="tx-address">${tx.to ? tx.to.substring(0, 20) + '...' : 'Контракт'}</div>
                                </div>
                                <div class="tx-amount in-amount">${(tx.value / 1e18).toFixed(4)} ETH</div>
                            </div>
                            <div class="fee">Газ: ${tx.gas_used} | Цена газа: ${(tx.gas_price / 1e9).toFixed(1)} Gwei</div>
                        `;
                        content.appendChild(card);
                    }
                }
            } catch (e) {
                content.innerHTML = '<div style="text-align:center; color:#ff4444;">Ошибка загрузки Ethereum</div>';
            }
        }
    </script>
</body>
</html>
