<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐋 КИТ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            padding: 15px;
            color: #fff;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .load-btn {
            width: 100%;
            padding: 18px;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 3px;
            border: 2px solid #f7931a;
            border-radius: 12px;
            background: rgba(247,147,26,0.15);
            color: #f7931a;
            cursor: pointer;
            margin-bottom: 15px;
        }
        .load-btn:active { background: rgba(247,147,26,0.3); }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
        }
        .btc-amount { font-size: 26px; font-weight: bold; color: #f7931a; }
        .usd-amount { font-size: 16px; color: #ffd700; margin: 3px 0; }
        .time-text { font-size: 11px; color: #888; }
        .addr-box {
            font-size: 10px;
            color: #aaa;
            background: rgba(0,0,0,0.5);
            padding: 8px;
            border-radius: 6px;
            margin: 8px 0;
            font-family: monospace;
            word-break: break-all;
        }
        .history-box {
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            padding: 10px;
            margin-top: 8px;
        }
        .history-title { font-size: 11px; color: #888; margin-bottom: 6px; }
        .row { display: flex; gap: 6px; }
        .stat {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border-radius: 6px;
            padding: 8px;
            text-align: center;
        }
        .stat-val { font-size: 16px; font-weight: bold; }
        .stat-lbl { font-size: 9px; color: #888; }
        .green { color: #00ff64; }
        .red { color: #ff4444; }
        .loader { text-align: center; padding: 40px; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #f7931a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .whale-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: bold;
            background: rgba(247,147,26,0.2);
            color: #f7931a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center;">🐋 Bitcoin Whales</h2>
        <p style="text-align:center; color:#888; font-size:12px; margin-bottom:15px;">Транзакции от 200 BTC • Данные из блокчейна</p>

        <button class="load-btn" onclick="load()" id="btn">
            🐋 ЗАГРУЗИТЬ КИТОВ
        </button>

        <div id="list">
            <div style="text-align:center; color:#555; padding:30px;">
                Нажми кнопку для загрузки
            </div>
        </div>
    </div>

    <script>
        async function getAddressInfo(address) {
            try {
                const response = await fetch(`https://blockchain.info/rawaddr/${address}?limit=50`);
                const data = await response.json();
                
                const sixMonthsAgo = Date.now() / 1000 - (180 * 24 * 60 * 60);
                
                let buys = 0;
                let sells = 0;
                let totalBought = 0;
                let totalSold = 0;
                
                data.txs.forEach(tx => {
                    if (tx.time < sixMonthsAgo) return;
                    
                    const totalOut = tx.out.reduce((sum, out) => sum + out.value, 0) / 100000000;
                    
                    // Определяем тип: если большой приход - покупка, если большой уход - продажа
                    const totalIn = tx.inputs.reduce((sum, inp) => sum + (inp.prev_out?.value || 0), 0) / 100000000;
                    
                    if (totalIn > totalOut) {
                        buys++;
                        totalBought += (totalIn - totalOut);
                    } else if (totalOut > totalIn) {
                        sells++;
                        totalSold += (totalOut - totalIn);
                    }
                });
                
                return {
                    buys,
                    sells,
                    totalBought,
                    totalSold,
                    totalTx: data.n_tx,
                    balance: data.final_balance / 100000000
                };
            } catch (e) {
                console.log('Ошибка получения истории:', e);
                return { buys: 0, sells: 0, totalBought: 0, totalSold: 0, totalTx: 0, balance: 0 };
            }
        }

        async function load() {
            const btn = document.getElementById('btn');
            const list = document.getElementById('list');
            
            btn.textContent = '⏳ Сканируем блокчейн...';
            btn.style.opacity = '0.7';
            list.innerHTML = '<div class="loader"><div class="spinner"></div><p style="color:#888;">Ищем китов от 200 BTC...</p></div>';

            try {
                const res = await fetch('https://blockchain.info/unconfirmed-transactions?format=json');
                const data = await res.json();
                
                // Фильтруем: только транзакции больше 200 BTC
                const whales = data.txs.filter(tx => {
                    const total = tx.out.reduce((s, o) => s + o.value, 0);
                    return total >= 20000000000; // 200 BTC в сатоши
                }).slice(0, 10);

                btn.textContent = '🐋 ЗАГРУЗИТЬ КИТОВ';
                btn.style.opacity = '1';

                if (!whales.length) {
                    list.innerHTML = '<div style="text-align:center; color:#888; padding:30px;">🐋 Сейчас нет транзакций от 200 BTC<br><span style="font-size:12px;">Попробуй позже</span></div>';
                    return;
                }

                list.innerHTML = '<div class="loader"><div class="spinner"></div><p style="color:#888;">Загружаем историю кошельков...</p></div>';

                const result = await Promise.all(whales.map(async tx => {
                    const totalSat = tx.out.reduce((s, o) => s + o.value, 0);
                    const btc = totalSat / 100000000;
                    
                    // Берём адрес получателя
                    const addr = tx.out.find(o => o.addr)?.addr || 
                                 tx.inputs[0]?.prev_out?.addr || 
                                 'Неизвестно';
                    
                    // Получаем историю кошелька
                    const history = await getAddressInfo(addr);
                    
                    return { btc, addr, time: tx.time, history, hash: tx.hash, size: tx.size };
                }));

                // Сортируем по размеру (большие сначала)
                result.sort((a, b) => b.btc - a.btc);

                list.innerHTML = result.map((r, i) => `
                    <div class="card">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span class="whale-badge">🐋 КИТ #${i + 1}</span>
                            <span style="font-size:10px; color:#666;">${r.size} bytes</span>
                        </div>
                        
                        <div class="btc-amount" style="margin-top:8px;">₿ ${r.btc.toFixed(2)} BTC</div>
                        <div class="usd-amount">≈ $${(r.btc * 60000).toLocaleString()}</div>
                        
                        <div class="time-text">
                            🕐 ${new Date(r.time * 1000).toLocaleString('ru-RU', {
                                day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit'
                            })}
                        </div>
                        
                        <div class="addr-box">
                            📍 Кошелёк: ${r.addr}
                        </div>
                        <div style="font-size:9px; color:#555; word-break:break-all;">
                            TX: ${r.hash}
                        </div>
                        
                        <div class="history-box">
                            <div class="history-title">
                                📊 Статистика кошелька за 6 месяцев
                                ${r.history.balance > 0 ? `| Баланс: ${r.history.balance.toFixed(2)} BTC` : ''}
                            </div>
                            <div class="row">
                                <div class="stat">
                                    <div class="stat-val green">${r.history.buys}</div>
                                    <div class="stat-lbl">Покупок</div>
                                </div>
                                <div class="stat">
                                    <div class="stat-val red">${r.history.sells}</div>
                                    <div class="stat-lbl">Продаж</div>
                                </div>
                                <div class="stat">
                                    <div class="stat-val green">${r.history.totalBought.toFixed(2)}</div>
                                    <div class="stat-lbl">BTC куплено</div>
                                </div>
                                <div class="stat">
                                    <div class="stat-val red">${r.history.totalSold.toFixed(2)}</div>
                                    <div class="stat-lbl">BTC продано</div>
                                </div>
                            </div>
                            <div style="font-size:10px; color:#666; margin-top:5px;">
                                Всего транзакций: ${r.history.totalTx}
                            </div>
                        </div>
                    </div>
                `).join('');

            } catch (e) {
                btn.textContent = '🐋 ЗАГРУЗИТЬ КИТОВ';
                btn.style.opacity = '1';
                list.innerHTML = '<div style="text-align:center; color:#ff4444; padding:30px;">⚠️ Ошибка загрузки<br><span style="font-size:12px;">Проверь соединение</span></div>';
                console.error(e);
            }
        }
    </script>
</body>
</html>
