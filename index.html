<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐋 КИТ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            padding: 15px;
            color: #fff;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .load-btn {
            width: 100%;
            padding: 18px;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 3px;
            border: 2px solid #f7931a;
            border-radius: 12px;
            background: rgba(247,147,26,0.15);
            color: #f7931a;
            cursor: pointer;
            margin-bottom: 15px;
        }
        .load-btn:active { background: rgba(247,147,26,0.3); }
        .block-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
        }
        .block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .block-height { font-size: 20px; font-weight: bold; color: #f7931a; }
        .block-time { font-size: 11px; color: #888; }
        .tx-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 12px;
        }
        .tx-amount { color: #f7931a; font-weight: bold; }
        .tx-hash {
            font-size: 9px;
            color: #666;
            font-family: monospace;
            word-break: break-all;
            flex: 1;
            margin: 0 8px;
        }
        .tx-type {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: bold;
            white-space: nowrap;
        }
        .type-in { background: rgba(0,255,100,0.1); color: #00ff64; }
        .type-out { background: rgba(255,68,68,0.1); color: #ff4444; }
        .loader { text-align: center; padding: 20px; }
        .spinner {
            width: 30px; height: 30px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #f7931a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .info-bar {
            text-align: center;
            font-size: 11px;
            color: #888;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center;">₿ Bitcoin Blockchain</h2>
        <p style="text-align:center; color:#888; font-size:12px; margin-bottom:15px;">Последние блоки в реальном времени</p>

        <button class="load-btn" onclick="loadBlockchain()" id="btn">
            🐋 ЗАГРУЗИТЬ
        </button>

        <div id="list">
            <div style="text-align:center; color:#555; padding:30px;">
                Нажми на кнопку
            </div>
        </div>
    </div>

    <script>
        async function loadBlockchain() {
            const btn = document.getElementById('btn');
            const list = document.getElementById('list');
            
            btn.textContent = '⏳ Загрузка блокчейна...';
            list.innerHTML = '<div class="loader"><div class="spinner"></div></div>';

            try {
                // Получаем последние 10 блоков
                const blocksRes = await fetch('https://blockchain.info/blocks?format=json');
                const blocksData = await blocksRes.json();
                const blocks = blocksData.blocks.slice(0, 10);

                btn.textContent = '🐋 ЗАГРУЗИТЬ';
                list.innerHTML = '<div class="info-bar">Загружено 10 последних блоков</div>';

                // Загружаем каждый блок
                for (const block of blocks) {
                    try {
                        const blockRes = await fetch(`https://blockchain.info/rawblock/${block.hash}`);
                        const blockData = await blockRes.json();
                        
                        const blockCard = document.createElement('div');
                        blockCard.className = 'block-card';
                        
                        const totalBTC = blockData.tx.reduce((sum, tx) => {
                            return sum + tx.out.reduce((s, o) => s + o.value, 0);
                        }, 0) / 100000000;
                        
                        blockCard.innerHTML = `
                            <div class="block-header">
                                <div>
                                    <div class="block-height">Блок #${blockData.height}</div>
                                    <div class="block-time">${new Date(blockData.time * 1000).toLocaleString('ru-RU')}</div>
                                </div>
                                <div style="text-align:right;">
                                    <div style="font-size:11px; color:#888;">Транзакций: ${blockData.tx.length}</div>
                                    <div style="font-size:11px; color:#f7931a;">Объём: ${totalBTC.toFixed(2)} BTC</div>
                                </div>
                            </div>
                            <div class="tx-list">
                                ${blockData.tx.slice(0, 5).map(tx => {
                                    const totalOut = tx.out.reduce((s, o) => s + o.value, 0) / 100000000;
                                    const totalIn = tx.inputs.reduce((s, inp) => s + (inp.prev_out?.value || 0), 0) / 100000000;
                                    const type = totalIn > totalOut ? 'ВХОД' : 'ВЫХОД';
                                    const typeClass = totalIn > totalOut ? 'type-in' : 'type-out';
                                    
                                    return `
                                        <div class="tx-row">
                                            <span class="tx-type ${typeClass}">${type}</span>
                                            <span class="tx-hash">${tx.hash.substring(0, 20)}...</span>
                                            <span class="tx-amount">${totalOut.toFixed(4)} BTC</span>
                                        </div>
                                    `;
                                }).join('')}
                                ${blockData.tx.length > 5 ? `<div style="font-size:10px; color:#555; text-align:center; padding:5px;">+ ещё ${blockData.tx.length - 5} транзакций</div>` : ''}
                            </div>
                        `;
                        
                        list.appendChild(blockCard);
                        
                    } catch (e) {
                        console.log('Ошибка загрузки блока:', e);
                    }
                }

            } catch (e) {
                btn.textContent = '🐋 ЗАГРУЗИТЬ';
                list.innerHTML = '<div style="text-align:center; color:#ff4444;">Ошибка загрузки</div>';
            }
        }
    </script>
</body>
</html>
