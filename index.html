<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КИТ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .whale-btn {
            width: 100%;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 4px;
            border: 2px solid #00d4ff;
            border-radius: 15px;
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .whale-btn:hover {
            background: rgba(0, 212, 255, 0.2);
        }

        .transaction-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 12px;
        }

        .coin-symbol {
            font-size: 20px;
            font-weight: bold;
            color: #00d4ff;
        }

        .amount-usd {
            font-size: 16px;
            color: #ffd700;
            font-weight: bold;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }

        .badge-buy {
            background: rgba(0, 255, 100, 0.2);
            color: #00ff64;
        }

        .badge-sell {
            background: rgba(255, 50, 50, 0.2);
            color: #ff3232;
        }

        .badge-transfer {
            background: rgba(0, 180, 255, 0.2);
            color: #00b4ff;
        }

        .loader {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align:center; margin-bottom:20px;">🐋 Whale Tracker</h1>

        <button class="whale-btn" onclick="loadWhales()" id="whaleButton">
            🐋 КИТ
        </button>

        <div id="transactionsList">
            <div style="text-align: center; color: #666; padding: 40px;">
                Нажми КИТ для загрузки
            </div>
        </div>
    </div>

    <script>
        const demoTtransactions = [
            { symbol: 'BTC', name: 'Bitcoin', amount: 1500, amount_usd: 45000000, type: 'transfer' },
            { symbol: 'ETH', name: 'Ethereum', amount: 25000, amount_usd: 37500000, type: 'buy' },
            { symbol: 'USDT', name: 'Tether', amount: 50000000, amount_usd: 50000000, type: 'transfer' },
            { symbol: 'BNB', name: 'Binance Coin', amount: 100000, amount_usd: 23000000, type: 'sell' },
            { symbol: 'SOL', name: 'Solana', amount: 500000, amount_usd: 75000000, type: 'buy' }
        ];

        function loadWhales() {
            const button = document.getElementById('whaleButton');
            const list = document.getElementById('transactionsList');
            
            button.classList.add('loading');
            button.textContent = '⏳ Загрузка...';
            
            list.innerHTML = '<div class="loader"><div class="spinner"></div><p>Отслеживаем китов...</p></div>';

            setTimeout(() => {
                button.classList.remove('loading');
                button.textContent = '🐋 КИТ';
                
                list.innerHTML = demoTtransactions.map(tx => `
                    <div class="transaction-card">
                        <div>
                            <span class="coin-symbol">${tx.symbol}</span>
                            <span class="badge badge-${tx.type}">${tx.type === 'buy' ? 'Покупка' : tx.type === 'sell' ? 'Продажа' : 'Перевод'}</span>
                        </div>
                        <div style="font-size:18px; font-weight:bold; margin:8px 0;">
                            ${tx.amount.toLocaleString()} ${tx.symbol}
                        </div>
                        <div class="amount-usd">
                            ≈ $${(tx.amount_usd / 1000000).toFixed(1)}M
                        </div>
                    </div>
                `).join('');
            }, 1500);
        }
    </script>
</body>
</html>
