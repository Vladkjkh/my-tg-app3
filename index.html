<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐋 КИТ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            padding: 15px;
            color: #fff;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .load-btn {
            width: 100%;
            padding: 18px;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 3px;
            border: 2px solid #f7931a;
            border-radius: 12px;
            background: rgba(247,147,26,0.15);
            color: #f7931a;
            cursor: pointer;
            margin-bottom: 15px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
        }
        .type-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: bold;
        }
        .badge-buy { background: rgba(0,255,100,0.15); color: #00ff64; }
        .badge-sell { background: rgba(255,68,68,0.15); color: #ff4444; }
        .btc-amount { font-size: 26px; font-weight: bold; color: #f7931a; margin-top: 8px; }
        .usd-amount { font-size: 16px; color: #ffd700; }
        .addr-box {
            font-size: 10px;
            color: #aaa;
            background: rgba(0,0,0,0.5);
            padding: 8px;
            border-radius: 6px;
            margin: 8px 0;
            font-family: monospace;
            word-break: break-all;
        }
        .loader { text-align: center; padding: 30px; }
        .spinner {
            width: 30px; height: 30px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #f7931a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center;">🐋 Bitcoin Whales</h2>
        <p style="text-align:center; color:#888; font-size:12px; margin-bottom:15px;">Киты из последнего блока</p>

        <button class="load-btn" onclick="load()" id="btn">
            🐋 ЗАГРУЗИТЬ
        </button>

        <div id="list">
            <div style="text-align:center; color:#555; padding:30px;">
                Нажми кнопку
            </div>
        </div>
    </div>

    <script>
        async function load() {
            const btn = document.getElementById('btn');
            const list = document.getElementById('list');
            
            btn.textContent = '⏳ Загрузка...';
            list.innerHTML = '<div class="loader"><div class="spinner"></div></div>';

            try {
                const res = await fetch('https://blockchain.info/latestblock');
                const latest = await res.json();
                
                const blockRes = await fetch(`https://blockchain.info/rawblock/${latest.hash}`);
                const block = await blockRes.json();
                
                const whales = block.tx.filter(tx => {
                    const total = tx.out.reduce((s, o) => s + o.value, 0);
                    return total >= 20000000000;
                }).slice(0, 10);

                btn.textContent = '🐋 ЗАГРУЗИТЬ';

                if (!whales.length) {
                    list.innerHTML = `<div style="text-align:center; color:#888; padding:30px;">
                        Нет транзакций от 200 BTC в блоке #${latest.height}
                    </div>`;
                    return;
                }

                list.innerHTML = `<div style="font-size:12px; color:#888; margin-bottom:10px;">
                    Блок #${latest.height} | ${new Date(block.time * 1000).toLocaleString('ru-RU')}
                </div>` + whales.map((tx, i) => {
                    const totalSat = tx.out.reduce((s, o) => s + o.value, 0);
                    const btc = totalSat / 100000000;
                    const addr = tx.out[0]?.addr || 'Неизвестно';
                    
                    return `
                        <div class="card">
                            <div style="display:flex; justify-content:space-between;">
                                <span style="font-size:11px; color:#888;">КИТ #${i + 1}</span>
                                <span class="type-badge badge-buy">BTC</span>
                            </div>
                            <div class="btc-amount">₿ ${btc.toFixed(2)} BTC</div>
                            <div class="usd-amount">≈ $${(btc * 60000).toLocaleString()}</div>
                            <div class="addr-box">📍 ${addr}</div>
                            <div style="font-size:8px; color:#555; word-break:break-all;">${tx.hash}</div>
                        </div>
                    `;
                }).join('');

            } catch (e) {
                btn.textContent = '🐋 ЗАГРУЗИТЬ';
                list.innerHTML = '<div style="text-align:center; color:#ff4444;">Ошибка сети. Попробуй позже.</div>';
            }
        }
    </script>
</body>
</html>
