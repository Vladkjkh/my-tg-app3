<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐋 КИТ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .whale-btn {
            width: 100%;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 4px;
            border: 2px solid #00d4ff;
            border-radius: 15px;
            background: rgba(0,212,255,0.1);
            color: #00d4ff;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .whale-btn:active { background: rgba(0,212,255,0.3); }
        .transaction-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 12px;
        }
        .coin-symbol { font-size: 20px; font-weight: bold; color: #f7931a; }
        .amount { font-size: 18px; font-weight: bold; margin: 8px 0; }
        .amount-usd { font-size: 16px; color: #ffd700; font-weight: bold; }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            background: rgba(247,147,26,0.2);
            color: #f7931a;
        }
        .hash {
            font-size: 10px;
            color: #666;
            margin-top: 8px;
            word-break: break-all;
            font-family: monospace;
        }
        .loader { text-align: center; padding: 40px; }
        .spinner {
            width: 50px; height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #f7931a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align:center; margin-bottom:10px;">🐋 Bitcoin Whale Tracker</h1>
        <p style="text-align:center; color:#888; margin-bottom:20px; font-size:14px;">Реальные транзакции из блокчейна</p>

        <button class="whale-btn" onclick="loadWhales()" id="whaleButton">
            🐋 КИТ
        </button>

        <div id="transactionsList">
            <div style="text-align:center; color:#666; padding:40px;">
                Нажми КИТ для загрузки
            </div>
        </div>
    </div>

    <script>
        async function loadWhales() {
            const button = document.getElementById('whaleButton');
            const list = document.getElementById('transactionsList');
            
            button.style.opacity = '0.7';
            button.textContent = '⏳ Сканируем блокчейн...';
            list.innerHTML = '<div class="loader"><div class="spinner"></div><p style="color:#888;">Ищем китов в реальном времени...</p></div>';

            try {
                const response = await fetch('https://blockchain.info/unconfirmed-transactions?format=json');
                const data = await response.json();
                
                // Фильтруем только крупные транзакции (>10 BTC)
                const whales = data.txs.filter(tx => {
                    const total = tx.out.reduce((sum, out) => sum + out.value, 0);
                    return total > 1000000000; // >10 BTC
                }).slice(0, 10);

                button.style.opacity = '1';
                button.textContent = '🐋 КИТ';

                if (whales.length === 0) {
                    list.innerHTML = '<div style="text-align:center; color:#888; padding:40px;">🐋 Киты пока спят...<br><span style="font-size:12px;">Нет крупных транзакций в мемпуле</span></div>';
                    return;
                }

                list.innerHTML = whales.map(tx => {
                    const totalSat = tx.out.reduce((sum, out) => sum + out.value, 0);
                    const btc = totalSat / 100000000;
                    const usd = btc * 60000; // Примерный курс

                    return `
                        <div class="transaction-card">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <span class="coin-symbol">₿ BTC</span>
                                <span class="badge">🐋 КИТ</span>
                            </div>
                            <div class="amount">${btc.toFixed(4)} BTC</div>
                            <div class="amount-usd">≈ $${usd.toLocaleString()}</div>
                            <div style="font-size:11px; color:#aaa; margin-top:5px;">
                                ${tx.out.length} выходов • ${tx.size} bytes
                            </div>
                            <div class="hash">TX: ${tx.hash}</div>
                        </div>
                    `;
                }).join('');

            } catch (error) {
                button.style.opacity = '1';
                button.textContent = '🐋 КИТ';
                list.innerHTML = '<div style="text-align:center; color:#ff4444; padding:40px;">⚠️ Ошибка подключения к блокчейну<br><span style="font-size:12px;">Попробуй позже</span></div>';
            }
        }
    </script>
</body>
</html>
